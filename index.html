<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULA PRO: ULTIMATE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.3.1/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="game-container"></div>

    <div class="ui-layer">
        
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="premium-card">
                <h1>FORMULA <span class="accent">PRO</span></h1>
                <p class="tagline">PREMIUM SIMULATION RACING</p>

                <div class="input-group">
                    <label>PILOT NAME</label>
                    <input type="text" id="player-name-input" placeholder="ENTER NAME..." maxlength="12">
                </div>

                <div class="input-group">
                    <label>SELECT TEAM</label>
                    <div class="model-buttons">
                        <button class="model-btn active" data-model="MCLAREN">MCLAREN</button>
                        <button class="model-btn" data-model="FERRARI">FERRARI</button>
                        <button class="model-btn" data-model="MERCEDES">MERCEDES</button>
                    </div>
                </div>

                <div class="input-group">
                    <label>LIVERY COLOR</label>
                    <input type="color" id="car-color-input" value="#ff8800">
                </div>

                <div class="main-buttons">
                    <button id="p1-btn" class="btn primary-btn">SOLO CAREER</button>
                    <div class="multi-row">
                        <button id="host-btn" class="btn secondary-btn">HOST LOBBY</button>
                        <button id="join-btn" class="btn secondary-btn">JOIN LOBBY</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lobby Screen -->
        <div id="lobby-screen" class="screen">
            <div class="premium-card">
                <h2>LOBBY <span class="accent">WAITING</span></h2>
                <div id="host-info" class="hidden">
                    <p>SHARE THIS CODE WITH FRIENDS:</p>
                    <div id="room-id-display" class="code-box">------</div>
                    <button id="start-multi-btn" class="btn primary-btn">START RACE</button>
                </div>
                <div id="join-info" class="hidden">
                    <p>ENTER HOST CODE:</p>
                    <input type="text" id="join-id-input" class="code-input" placeholder="PASTE CODE HERE">
                    <button id="connect-btn" class="btn primary-btn">CONNECT</button>
                </div>
                <div id="connection-status">INITIALIZING...</div>
            </div>
        </div>

        <!-- HUD -->
        <div id="hud" class="hud hidden">
            <div class="hud-top">
                <div class="pilot-info">
                    <span id="player-name-hud">PILOT</span>
                    <div class="team-badge" id="hud-team-badge">MCLAREN</div>
                </div>
                <div class="score-box">
                    <span class="label">SPEED</span>
                    <span id="current-score" class="score">0</span>
                    <span class="unit">KM/H</span>
                </div>
            </div>
            <div class="hud-bottom">
                <div id="drs-ui" class="powerup-slot-glass">DRS: UNAVAILABLE</div>
                <div class="powerup-slot-glass">CAM: [C]</div>
                <div class="powerup-slot-glass">NIGHT: [N]</div>
            </div>
            <div id="response-bar">
                <div class="bar-row">
                    <span class="bar-label">THROTTLE</span>
                    <div class="bar-track"><div id="speed-bar" class="bar-fill speed-fill"></div></div>
                </div>
                <div class="bar-row">
                    <span class="bar-label">RACE</span>
                    <div class="bar-track"><div id="progress-bar" class="bar-fill progress-fill"></div></div>
                    <span id="progress-pct" class="bar-pct">0%</span>
                </div>
            </div>
        </div>

        <!-- Leaderboard / Race Over -->
        <div id="leaderboard-screen" class="screen">
            <div class="premium-card">
                <h1>RACE <span class="accent">FINISHED</span></h1>
                <div class="leaderboard-container" id="leaderboard-list">
                    <!-- Dynamic List Items Go Here -->
                </div>
                <div class="main-buttons">
                    <button id="rematch-btn" class="btn primary-btn">REMATCH ONLINE</button>
                    <button id="quit-btn" class="btn secondary-btn">QUIT TO MENU</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
